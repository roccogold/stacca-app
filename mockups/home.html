<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FBF7F0" />
  <title>Stacca — Oggi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="app-header">
    <div class="brand-row">
      <img src="stacca-icon.svg" alt="" class="brand-mark brand-mark--stacca" width="38" height="38" />
      <span class="brand">Stacca</span>
    </div>
    <a href="profilo.html" class="btn-icon" aria-label="Profilo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a7 7 0 0 1 14 0v1"/></svg>
    </a>
  </header>

  <main class="screen">

    <h1 class="h1" style="margin-top:8px">Ciao, Claudio</h1>
    <div class="muted" style="font-size:14px;margin-bottom:20px">Lunedì 4 maggio 2026</div>

    <!-- Today summary -->
    <div class="card card--accent">
      <div class="card-header">
        <h2 class="card-title">Oggi</h2>
        <span class="badge" style="background:rgba(255,255,255,0.15);color:#fff">3 voci</span>
      </div>
      <div class="hours-hero">
        <div class="hours-hero__num">7,5</div>
        <div class="hours-hero__unit">ore registrate</div>
      </div>
    </div>

    <!-- Today's entries -->
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Voci di oggi</h2>
        <a href="#" class="muted" style="font-size:13px">Modifica</a>
      </div>

      <div class="entry">
        <div class="entry__hours">
          <div class="entry__hours-num">3,5</div>
          <div class="entry__hours-unit">ore</div>
        </div>
        <div class="entry__body">
          <p class="entry__title">Potatura</p>
          <div class="entry__meta">San Rocco</div>
        </div>
        <div class="entry__action">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>

      <div class="entry">
        <div class="entry__hours">
          <div class="entry__hours-num">2</div>
          <div class="entry__hours-unit">ore</div>
        </div>
        <div class="entry__body">
          <p class="entry__title">Cantina</p>
          <div class="entry__meta">Cantina</div>
        </div>
        <div class="entry__action">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>

      <div class="entry">
        <div class="entry__hours">
          <div class="entry__hours-num">2</div>
          <div class="entry__hours-unit">ore</div>
        </div>
        <div class="entry__body">
          <p class="entry__title">Trattore</p>
          <div class="entry__meta">Doccia</div>
        </div>
        <div class="entry__action">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </div>

    <!-- Month total at a glance -->
    <h3 class="section-title">Questo mese</h3>
    <a href="mese.html" class="card" style="display:block;text-decoration:none">
      <div class="row-between">
        <div>
          <div style="font-family:var(--font-serif);font-size:32px;line-height:1">82,5 <span class="muted" style="font-size:14px;font-family:var(--font-sans)">ore</span></div>
          <div class="muted" style="font-size:13px;margin-top:4px">Maggio · in corso</div>
        </div>
        <span class="badge badge--open"><span class="status-dot"></span> Aperto</span>
      </div>
    </a>

  </main>

  <!-- Floating add button -->
  <button class="fab" onclick="window.location.href='aggiungi.html'" aria-label="Aggiungi ore">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <div class="bottom-nav__inner">
      <a href="home.html" class="bottom-nav__item bottom-nav__item--active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
        Oggi
      </a>
      <a href="mese.html" class="bottom-nav__item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Mese
      </a>
      <a href="profilo.html" class="bottom-nav__item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a7 7 0 0 1 14 0v1"/></svg>
        Profilo
      </a>
    </div>
  </nav>

</body>
</html>
