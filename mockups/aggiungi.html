<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FBF7F0" />
  <title>Stacca — Aggiungi ore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="no-nav">

  <header class="app-header with-back">
    <a href="home.html" class="btn-icon" aria-label="Indietro">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1 class="app-header__title">Aggiungi ore</h1>
    <div style="width:44px"></div>
  </header>

  <main class="screen" style="padding-top:20px;padding-bottom:120px">

    <!-- Date -->
    <div class="field">
      <label class="field-label" for="data">Data</label>
      <input class="input" id="data" type="date" value="2026-05-04" />
      <div class="field-help">Oggi · Lunedì 4 maggio</div>
    </div>

    <!-- Hours -->
    <div class="field">
      <label class="field-label">Ore</label>
      <div class="stepper">
        <button class="stepper__btn" type="button" aria-label="Diminuisci">−</button>
        <div class="stepper__value">3,5<span class="stepper__unit">ore</span></div>
        <button class="stepper__btn" type="button" aria-label="Aumenta">+</button>
      </div>
      <div class="chips">
        <button class="chip" type="button">2</button>
        <button class="chip" type="button">4</button>
        <button class="chip chip--active" type="button">3,5</button>
        <button class="chip" type="button">6</button>
        <button class="chip" type="button">8</button>
      </div>
    </div>

    <!-- Mansione -->
    <div class="field">
      <label class="field-label" for="mansione">Mansione</label>
      <select class="select" id="mansione">
        <option value="">Scegli mansione...</option>
        <option>Accapannatura</option>
        <option>Cantina</option>
        <option>Chiusura 1° Filo</option>
        <option>Chiusura 2° Filo</option>
        <option>Diradamento</option>
        <option>Legatura Macchinetta</option>
        <option>Legatura Salcio</option>
        <option selected>Potatura</option>
        <option>Pulizia</option>
        <option>Sfogliatura</option>
        <option>Stralciatura</option>
        <option>Trattore</option>
        <option>Vendemmia</option>
        <option>Altro</option>
      </select>
    </div>

    <!-- Luogo -->
    <div class="field">
      <label class="field-label" for="luogo">Luogo</label>
      <select class="select" id="luogo">
        <option value="">Scegli luogo...</option>
        <optgroup label="Vigne">
          <option>Anfiteatro Nuovo Lato Corzanello</option>
          <option>Anfiteatro Lato Bosco</option>
          <option>Cabernet Piaggia</option>
          <option>Capraio F9</option>
          <option>Capraio R23</option>
          <option>Dietro Corzanello</option>
          <option>Doccia</option>
          <option>F9</option>
          <option>La Chiesa</option>
          <option>Luigi</option>
          <option>Merlot Pecore</option>
          <option>Muretto</option>
          <option selected>San Rocco</option>
          <option>San Vito Cabernet</option>
          <option>San Vito Sangiovese Piaggia</option>
          <option>San Vito Sangiovese Piano</option>
          <option>Sassaio M</option>
          <option>Sassaio Semillon</option>
          <option>Sassaio SG</option>
          <option>Sopra Doccia</option>
          <option>Sorbigliano</option>
          <option>Strada</option>
          <option>Traliccio</option>
          <option>Trebbiano</option>
          <option>VDM</option>
          <option>Vigna Alta Nuova</option>
          <option>Vigna Del Fosso</option>
          <option>Vigna Grande Cana</option>
          <option>Vigna Grande Nuova (Tre Borri)</option>
        </optgroup>
        <optgroup label="Altro">
          <option>Cantina</option>
          <option>Magazzino</option>
          <option>Officina</option>
          <option>Ufficio</option>
          <option>Altro</option>
        </optgroup>
      </select>
    </div>

    <!-- Note (optional, required if Altro) -->
    <div class="field">
      <label class="field-label" for="note">Note <span class="muted" style="text-transform:none;font-weight:400;letter-spacing:0;font-size:12px">(facoltativo)</span></label>
      <textarea class="textarea" id="note" placeholder="Aggiungi una nota..."></textarea>
    </div>

  </main>

  <!-- Sticky save action -->
  <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(to bottom, transparent, var(--bg) 24px);padding:24px 20px calc(20px + var(--safe-bottom));z-index:10">
    <div style="max-width:480px;margin:0 auto">
      <button class="btn btn--primary btn--block btn--lg" type="button" onclick="window.location.href='home.html'">
        Salva voce
      </button>
    </div>
  </div>

</body>
</html>
