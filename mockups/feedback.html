<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FBF7F0" />
  <title>Stacca — Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="no-nav">

  <header class="app-header with-back">
    <a href="profilo.html" class="btn-icon" aria-label="Indietro">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1 class="app-header__title">Feedback</h1>
    <div style="width:44px"></div>
  </header>

  <main class="screen" style="padding-top:20px;padding-bottom:32px">
    <div class="callout callout--info" style="margin-bottom:16px">
      Nell&apos;app Next.js (<code>web/</code>) questo modulo invia email via Resend. Qui è solo mockup statico.
    </div>
    <div class="field">
      <label class="field-label" for="msg">Messaggio</label>
      <textarea class="textarea" id="msg" rows="6" placeholder="Es.: vorrei un promemoria alle 17…"></textarea>
    </div>
    <button class="btn btn--primary btn--block btn--lg" type="button">Invia feedback</button>
  </main>

</body>
</html>
