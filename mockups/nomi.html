<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20 nomi — scelta logo (Stacca vince)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #EDE6D6;
      --panel: #FFFFFF;
      --cream: #FBF7F0;
      --primary: #632E24;
      --olive: #5A6B3F;
      --gold: #C97B30;
      --text: #2A2520;
      --muted: #8B8278;
      --border: #E8E0D2;
      --shadow: 0 2px 12px rgba(42, 37, 32, 0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    .top {
      text-align: center;
      margin-bottom: 36px;
    }
    .top h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .top p {
      color: var(--muted);
      font-size: 15px;
      max-width: 520px;
      margin: 0 auto;
    }
    .top a {
      display: inline-block;
      margin-top: 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .card__num {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--muted);
      padding: 12px 16px 0;
      text-transform: uppercase;
    }
    .preview {
      margin: 12px 16px;
      background: var(--cream);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .preview__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }
    .brand__name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .brand__icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-weight: 700;
      font-size: 17px;
      line-height: 1;
    }
    .brand__icon svg {
      display: block;
    }
    .preview__body {
      padding: 16px;
    }
    .preview__hello {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .preview__sub {
      font-size: 13px;
      color: var(--muted);
    }
    .card__meta {
      padding: 0 16px 16px;
    }
    .card__tag {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .card__note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }
    .profile-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #fff;
    }

    /* Logo color variants */
    .logo--wine { background: var(--primary); color: #fff; }
    .logo--olive { background: var(--olive); color: #fff; }
    .logo--gold { background: var(--gold); color: #fff; }
    .logo--soft { background: #F2E4E0; color: var(--primary); }
    .logo--earth { background: #8B6F47; color: #fff; }
    .logo--night { background: #3D4A35; color: #fff; }
    .logo--outline {
      background: #fff;
      color: var(--primary);
      border: 2px solid var(--primary);
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="top">
      <h1>20 nomi · 20 loghi</h1>
      <p>Brainstorm nomi per l’app ore — <strong>Stacca</strong> è quello scelto. Qui sotto le alternative considerate.</p>
      <a href="index.html">← Torna ai mockup schermate</a>
    </header>

    <div class="grid" id="grid"></div>
  </div>

  <script>
    const brands = [
      {
        name: "Uè",
        tag: "Il saluto toscano",
        note: "Come un collega che ti ferma in vigna. Breve, vivo, zero corporate.",
        logo: "letter",
        letter: "U",
        variant: "logo--wine",
      },
      {
        name: "Conta",
        tag: "Conta le ore",
        note: "Diretto al punto. Chi capisce subito cosa fa l’app.",
        logo: "letter",
        letter: "C",
        variant: "logo--olive",
      },
      {
        name: "Bacco",
        tag: "Vigna e convivialità",
        note: "Radici toscane, lavoro e tavola. Caldo ma riconoscibile.",
        logo: "grape",
        variant: "logo--wine",
      },
      {
        name: "Filo",
        tag: "Legatura e filare",
        note: "Per chi vive la vigna. Suona da mestiere, non da software.",
        logo: "letter",
        letter: "F",
        variant: "logo--earth",
      },
      {
        name: "Zappa",
        tag: "Terra e fatica",
        note: "Onesto, contadino. Per operai che rispettano il lavoro manuale.",
        logo: "letter",
        letter: "Z",
        variant: "logo--earth",
      },
      {
        name: "Nello",
        tag: "Un nome vero",
        note: "Come Stacca: un verbo toscano, non un prodotto. Familiare in vigna.",
        logo: "letter",
        letter: "N",
        variant: "logo--wine",
      },
      {
        name: "Tino",
        tag: "Breve e toscano",
        note: "Diminutivo amichevole. Facile da dire e da ricordare.",
        logo: "letter",
        letter: "T",
        variant: "logo--soft",
      },
      {
        name: "Mattino",
        tag: "Si apre la giornata",
        note: "Evoca l’inizio del turno. Poetico ma concreto.",
        logo: "sun",
        variant: "logo--gold",
      },
      {
        name: "Palmo",
        tag: "Mani al lavoro",
        note: "Misura, gesto, corporeo. Diverso dagli altri nomi tech.",
        logo: "letter",
        letter: "P",
        variant: "logo--olive",
      },
      {
        name: "Botte",
        tag: "Cantina e vendemmia",
        note: "Oltrarno del campo: dove finisce l’uva. Identità forte Corzano.",
        logo: "barrel",
        variant: "logo--wine",
      },
      {
        name: "Rigo",
        tag: "Filare di vigna",
        note: "Geometria del campo. Corto, distintivo, facile da scrivere.",
        logo: "rows",
        variant: "logo--olive",
      },
      {
        name: "Stacca",
        tag: "Fine turno",
        note: "Quando chiudi la giornata. Moderno, verbo d’azione.",
        logo: "check",
        variant: "logo--night",
      },
      {
        name: "Buon'ora",
        tag: "Alla buon'ora",
        note: "Il vecchio payoff. Suona da proverbio, non da app store.",
        logo: "clock",
        variant: "logo--gold",
      },
      {
        name: "Campo",
        tag: "Dove si lavora",
        note: "Ampio, semplice. Va bene se l’app cresce oltre la vigna.",
        logo: "hills",
        variant: "logo--olive",
      },
      {
        name: "Vigna",
        tag: "Cuore del lavoro",
        note: "Identità chiarissima. Forse troppo stretto se aggiungi cantina/officina.",
        logo: "leaf",
        variant: "logo--olive",
      },
      {
        name: "Ore",
        tag: "Minimo assoluto",
        note: "Zero fronzoli. Si capisce in un secondo, difficile da confondere.",
        logo: "letter",
        letter: "O",
        variant: "logo--outline",
      },
      {
        name: "Diario",
        tag: "Il tuo registro",
        note: "Coerente con “Apri il tuo diario delle ore” del login.",
        logo: "book",
        variant: "logo--soft",
      },
      {
        name: "Ceppo",
        tag: "Radici e territorio",
        note: "Olivo, tradizione, permanenza. Poetico, meno ovvio.",
        logo: "tree",
        variant: "logo--earth",
      },
      {
        name: "Tratto",
        tag: "Un pezzo di giornata",
        note: "Turno, segmento, porzione di lavoro. Suona professionale ma umano.",
        logo: "dash",
        variant: "logo--wine",
      },
      {
        name: "Giorno",
        tag: "Un giorno alla volta",
        note: "Calmo, quotidiano. Centrato sulla routine dell’operaio.",
        logo: "sunrise",
        variant: "logo--gold",
      },
    ];

    const icons = {
      grape: `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="8" cy="10" r="2.2"/><circle cx="12" cy="8" r="2.2"/><circle cx="16" cy="10" r="2.2"/><circle cx="10" cy="14" r="2.2"/><circle cx="14" cy="14" r="2.2"/><path d="M12 16v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>`,
      sun: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>`,
      barrel: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="7" rx="7" ry="2.5"/><path d="M5 7v10c0 1.4 3.1 2.5 7 2.5s7-1.1 7-2.5V7"/><path d="M5 12c0 1.4 3.1 2.5 7 2.5s7-1.1 7-2.5"/></svg>`,
      rows: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>`,
      check: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M5 12l4 4 10-10"/></svg>`,
      clock: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`,
      hills: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18l5-8 4 6 3-4 6 6"/></svg>`,
      leaf: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21C12 21 5 15 5 9a7 7 0 0 1 14 0c0 6-7 12-7 12z"/></svg>`,
      book: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h7a3 3 0 0 1 3 3v13H8a3 3 0 0 1-3-3V4z"/><path d="M19 4h-7a3 3 0 0 0-3 3v13h7a3 3 0 0 0 3-3V4z"/></svg>`,
      tree: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="9" r="4"/><path d="M8 20h8M10 13v7M14 13v7"/></svg>`,
      dash: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg>`,
      sunrise: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18h18"/><path d="M12 4v4M7 8l2 2M17 8l-2 2"/><path d="M12 12a4 4 0 0 1 4 4H8a4 4 0 0 1 4-4z"/></svg>`,
    };

    function renderLogo(b) {
      if (b.logo === "letter") {
        return `<span class="brand__icon ${b.variant}">${b.letter}</span>`;
      }
      return `<span class="brand__icon ${b.variant}">${icons[b.logo]}</span>`;
    }

    const grid = document.getElementById("grid");
    brands.forEach((b, i) => {
      const el = document.createElement("article");
      el.className = "card";
      el.innerHTML = `
        <div class="card__num">${String(i + 1).padStart(2, "0")}</div>
        <div class="preview">
          <div class="preview__header">
            <div class="brand">
              ${renderLogo(b)}
              <span class="brand__name">${b.name}</span>
            </div>
            <div class="profile-dot" aria-hidden></div>
          </div>
          <div class="preview__body">
            <div class="preview__hello">Ciao, Marco</div>
            <div class="preview__sub">Martedì 2 giugno 2026</div>
          </div>
        </div>
        <div class="card__meta">
          <div class="card__tag">${b.tag}</div>
          <div class="card__note">${b.note}</div>
        </div>
      `;
      grid.appendChild(el);
    });
  </script>
</body>
</html>
